<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Goal 11 | Data Grid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-wrapper">
        <!-- Sidebar: Block element by nature -->
        <aside class="sidebar">
            <div class="nav-item">OVERVIEW</div>
            <div class="nav-item">METRICS</div>
            <div class="nav-item">REPORTS</div>
        </aside>

        <!-- Main Content: Flex Container -->
        <main class="data-grid">
            
            <div class="info-card">
                <span class="status-tag">REAL-TIME</span>
                <h3>Target 11.3</h3>
                <p>Enhance inclusive and sustainable urbanization.</p>
            </div>

            <div class="info-card">
                <span class="status-tag">STABLE</span>
                <h3>Target 11.4</h3>
                <p>Protect the world’s cultural and natural heritage.</p>
            </div>

            <div class="info-card hidden-intel">
                <!-- This will be removed from view via CSS -->
                <h3>Classified Data</h3>
            </div>

        </main>
    </div>

</body>
</html>
